name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and test
        run: |
          npm run typecheck
          npm test

      - name: Package Windows portable + installer
        run: npm run package:win --workspace @openapi-collection-studio/desktop

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            apps/desktop/dist/*-portable.exe
            apps/desktop/dist/*.exe
            apps/desktop/dist/latest.yml
