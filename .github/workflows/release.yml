name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            package-command: npm run package:win --workspace @openapi-collection-studio/desktop
            artifact-name: specfold-windows
            artifact-path: |
              apps/desktop/dist/*.exe
          - platform: macos
            runner: macos-latest
            package-command: npm run package:mac --workspace @openapi-collection-studio/desktop
            artifact-name: specfold-macos
            artifact-path: |
              apps/desktop/dist/*.dmg
              apps/desktop/dist/*.zip
          - platform: linux
            runner: ubuntu-latest
            package-command: npm run package:linux --workspace @openapi-collection-studio/desktop
            artifact-name: specfold-linux
            artifact-path: |
              apps/desktop/dist/*.AppImage
              apps/desktop/dist/*.deb

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm fakeroot dpkg file
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64 || true

      - name: Install dependencies
        run: npm ci

      - name: Ensure 7zip-bin binary is present
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          if [ ! -f node_modules/7zip-bin/win/x64/7za.exe ]; then
            echo "7za.exe missing after npm ci (workspace hoisting); reinstalling 7zip-bin"
            npm install 7zip-bin --no-save
          fi
          ls -la node_modules/7zip-bin/win/x64/

      - name: Typecheck and test
        run: |
          npm run typecheck
          npm test

      - name: Package ${{ matrix.platform }}
        run: ${{ matrix.package-command }}

      - name: List built artifacts
        shell: bash
        run: ls -la apps/desktop/dist

      - name: Upload ${{ matrix.platform }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  verify-packages:
    name: Verify release bundle
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release artifacts
        run: find release-artifacts -maxdepth 2 -type f -print | sort

      - name: Verify public asset set
        shell: bash
        run: |
          test "$(find release-artifacts -type f -name '*.exe' | wc -l)" -eq 2
          test "$(find release-artifacts -type f -name '*.dmg' | wc -l)" -eq 2
          test "$(find release-artifacts -type f -name '*.zip' | wc -l)" -eq 2
          test "$(find release-artifacts -type f -name '*.AppImage' | wc -l)" -eq 1
          test "$(find release-artifacts -type f -name '*.deb' | wc -l)" -eq 1
          if find release-artifacts -type f \( -name '*.yml' -o -name '*.yaml' -o -name '*.blockmap' \) | grep -q .; then
            echo "Internal updater/debug metadata must not be public release assets."
            exit 1
          fi

      - name: Generate SHA256 checksums
        shell: bash
        working-directory: release-artifacts
        run: find . -maxdepth 1 -type f ! -name 'SHA256SUMS.txt' -printf '%f\n' | sort | xargs sha256sum > SHA256SUMS.txt

      - name: Upload verified release bundle
        uses: actions/upload-artifact@v4
        with:
          name: specfold-release-bundle
          path: release-artifacts/*
          if-no-files-found: error

  publish-release:
    name: Publish draft release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: verify-packages
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: specfold-release-bundle
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-artifacts/*
