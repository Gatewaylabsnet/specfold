name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            package-command: npm run package:win --workspace @openapi-collection-studio/desktop
            artifact-name: specfold-windows
            artifact-path: |
              apps/desktop/dist/*.exe
              apps/desktop/dist/*.yml
              apps/desktop/dist/*.blockmap
          - platform: macos
            runner: macos-latest
            package-command: npm run package:mac --workspace @openapi-collection-studio/desktop
            artifact-name: specfold-macos
            artifact-path: |
              apps/desktop/dist/*.dmg
              apps/desktop/dist/*.zip
              apps/desktop/dist/*.yml
              apps/desktop/dist/*.blockmap
          - platform: linux
            runner: ubuntu-latest
            package-command: npm run package:linux --workspace @openapi-collection-studio/desktop
            artifact-name: specfold-linux
            artifact-path: |
              apps/desktop/dist/*.AppImage
              apps/desktop/dist/*.deb
              apps/desktop/dist/*.yml

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' && 'true' || 'false' }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_KEYCHAIN: ${{ secrets.APPLE_KEYCHAIN }}
      APPLE_KEYCHAIN_PROFILE: ${{ secrets.APPLE_KEYCHAIN_PROFILE }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: npm ci

      - name: Ensure 7zip-bin binary is present
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          if [ ! -f node_modules/7zip-bin/win/x64/7za.exe ]; then
            echo "7za.exe missing after npm ci (workspace hoisting); reinstalling 7zip-bin"
            npm install 7zip-bin --no-save
          fi
          ls -la node_modules/7zip-bin/win/x64/

      - name: Typecheck and test
        run: |
          npm run typecheck
          npm test

      - name: Package ${{ matrix.platform }}
        run: ${{ matrix.package-command }}

      - name: List built artifacts
        shell: bash
        run: ls -la apps/desktop/dist

      - name: Upload ${{ matrix.platform }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  publish-release:
    name: Publish draft release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release artifacts
        run: find release-artifacts -maxdepth 2 -type f -print | sort

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-artifacts/*
