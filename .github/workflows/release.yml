name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure 7zip-bin binary is present
        shell: bash
        run: |
          if [ ! -f node_modules/7zip-bin/win/x64/7za.exe ]; then
            echo "7za.exe missing after npm ci (workspace hoisting) — reinstalling 7zip-bin"
            npm install 7zip-bin --no-save
          fi
          ls -la node_modules/7zip-bin/win/x64/

      - name: Typecheck and test
        run: |
          npm run typecheck
          npm test

      - name: Package Windows portable (required)
        run: npm run package:win:portable --workspace @openapi-collection-studio/desktop

      - name: Package Windows installer (best-effort)
        continue-on-error: true
        run: npm run package:win:installer --workspace @openapi-collection-studio/desktop

      - name: List built artifacts
        shell: bash
        run: ls -la apps/desktop/dist || true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.yml
