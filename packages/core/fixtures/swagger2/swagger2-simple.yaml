swagger: "2.0"
info:
  title: Swagger Pets
  version: 1.0.0
host: api.example.com
basePath: /v1
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json
paths:
  /pets:
    get:
      summary: List pets
      tags:
        - Pets
      parameters:
        - name: limit
          in: query
          type: integer
          default: 10
      responses:
        "200":
          description: Pet list
          schema:
            type: object
            properties:
              total:
                type: integer
    post:
      summary: Create pet
      tags:
        - Pets
      parameters:
        - name: body
          in: body
          schema:
            type: object
            properties:
              name:
                type: string
      responses:
        "201":
          description: Created

