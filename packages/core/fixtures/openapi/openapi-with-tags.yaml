openapi: 3.0.3
info:
  title: Tagged API
  version: 1.0.0
paths:
  /users:
    get:
      summary: List users
      tags:
        - Users
      responses:
        "200":
          description: OK
  /auth/token:
    post:
      summary: Create token
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Token
          content:
            application/json:
              example:
                access_token: abc

